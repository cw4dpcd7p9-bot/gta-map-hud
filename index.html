<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GTA-Style Map HUD V3</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <style>
        :root {
            --gta-gold: #f2c94c;
            --gta-green: #2ecc71;
            --gta-pink: #ff00ff;
            --gta-yellow: #f1c40f;
            --gta-purple: #9b59b6;
            --gta-cyan: #00ffff;
            --hud-bg: rgba(10, 10, 10, 0.92);
            --hud-border: 2px solid var(--gta-gold);
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: #000;
            font-family: 'Impact', 'Arial Black', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        
        #map {
            height: 100vh; width: 100vw;
            transition: filter 0.8s ease;
        }

        /* Video Game Visual Overlays */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.12),
                rgba(0, 0, 0, 0.12) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none; z-index: 900;
            animation: scanlineFlicker 0.15s infinite;
        }

        @keyframes scanlineFlicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.98; }
        }

        .vignette {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            box-shadow: 0 0 200px rgba(0,0,0,0.85) inset, 
                        0 0 80px rgba(242,201,76,0.1) inset;
            pointer-events: none; z-index: 901;
        }

        .vice-city-filter { 
            filter: hue-rotate(280deg) saturate(250%) contrast(130%) invert(10%); 
        }

        /* HUD Styling */
        #ui-container {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            display: flex; flex-direction: column; gap: 15px;
            pointer-events: none; 
            max-height: 90vh;
            overflow-y: auto;
        }

        #ui-container::-webkit-scrollbar {
            width: 6px;
        }

        #ui-container::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.5);
        }

        #ui-container::-webkit-scrollbar-thumb {
            background: var(--gta-gold);
            border-radius: 3px;
        }

        .hud-panel {
            background: var(--hud-bg);
            border: var(--hud-border);
            border-radius: 4px; 
            padding: 15px; 
            width: 290px;
            box-shadow: 0 0 20px rgba(242, 201, 76, 0.25), 
                        inset 0 0 20px rgba(0,0,0,0.5);
            pointer-events: auto; 
            backdrop-filter: blur(10px);
        }

        .hud-panel.compact {
            width: 260px;
            padding: 12px;
        }

        /* Route Info Panel */
        #route-info {
            font-size: 12px;
            color: var(--gta-green);
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .route-stat {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            padding: 4px 0;
            border-bottom: 1px solid rgba(242,201,76,0.2);
        }

        .route-stat-label {
            color: var(--gta-gold);
        }

        .route-stat-value {
            color: var(--gta-green);
            font-weight: bold;
        }

        /* Speedometer Overlay */
        #speed-panel {
            position: absolute; bottom: 30px; right: 30px; z-index: 1000;
            background: var(--hud-bg); 
            border: var(--hud-border);
            padding: 15px 25px; 
            border-radius: 4px;
            text-align: right; 
            box-shadow: 0 0 25px rgba(0,0,0,0.9), 0 0 15px rgba(242,201,76,0.3);
            display: none;
        }

        #speed-value {
            font-size: 56px; 
            color: #fff; 
            line-height: 1;
            text-shadow: 3px 3px 0px var(--gta-gold), 
                         -1px -1px 0px var(--gta-cyan);
            letter-spacing: -2px;
            font-weight: bold;
        }

        #speed-unit { 
            font-size: 14px; 
            color: var(--gta-gold); 
            letter-spacing: 3px;
            margin-top: 5px;
        }

        h1 {
            margin: 0 0 12px 0; 
            font-size: 24px; 
            text-transform: uppercase;
            letter-spacing: 3px; 
            color: var(--gta-gold);
            text-shadow: 3px 3px 0px #000, 2px 2px 0px var(--gta-cyan);
        }

        h2 {
            margin: 0 0 8px 0;
            font-size: 14px;
            color: var(--gta-yellow);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .btn {
            background: linear-gradient(to bottom, #333, #111);
            color: #fff; 
            border: 1px solid var(--gta-gold);
            padding: 11px; 
            margin-bottom: 8px; 
            width: 100%;
            cursor: pointer; 
            font-family: inherit; 
            font-size: 13px;
            text-transform: uppercase; 
            transition: all 0.1s;
            letter-spacing: 1px;
            font-weight: bold;
            box-shadow: 0 4px 0 rgba(0,0,0,0.5);
            position: relative;
            top: 0;
        }
        
        .btn:hover {
            background: linear-gradient(to bottom, #444, #222);
            box-shadow: 0 6px 0 rgba(0,0,0,0.5);
            top: -2px;
        }

        .btn:active { 
            transform: scale(0.98);
            background: var(--gta-gold); 
            color: #000;
            top: 4px;
            box-shadow: 0 0 0 rgba(0,0,0,0.5);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        select {
            width: 100%; 
            padding: 10px; 
            margin-bottom: 12px;
            background: #000; 
            color: var(--gta-gold);
            border: 1px solid var(--gta-gold); 
            font-family: inherit; 
            outline: none;
            cursor: pointer;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select:hover {
            background: rgba(242,201,76,0.1);
        }

        select:focus {
            box-shadow: 0 0 10px rgba(242,201,76,0.5);
        }

        .status-text {
            font-size: 11px; 
            color: #0f0; 
            margin-top: 8px;
            font-family: 'Courier New', Courier, monospace; 
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.3;
            min-height: 20px;
            animation: statusBlink 1s infinite;
        }

        .status-text.error {
            color: #ff3333;
        }

        .status-text.success {
            color: var(--gta-green);
            animation: none;
        }

        @keyframes statusBlink {
            0%, 49%, 100% { opacity: 1; }
            50%, 99% { opacity: 0.7; }
        }

        /* Pulsing Radar Animations */
        @keyframes radarPulse {
            0% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
            70% { box-shadow: 0 0 0 12px rgba(46, 204, 113, 0); }
            100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
        }

        @keyframes waypointPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

        .gta-blip {
            background-color: #fff; 
            border: 2px solid #000; 
            border-radius: 50%;
            filter: drop-shadow(0 0 3px rgba(0,0,0,0.8));
        }

        .gta-blip.player {
            background-color: var(--gta-green);
            border-radius: 50% 50% 0 50%; 
            transform: rotate(45deg);
            animation: radarPulse 2s infinite;
            filter: drop-shadow(0 0 5px var(--gta-green));
        }

        .gta-blip.home {
            background-color: var(--gta-pink); 
            border-radius: 2px;
            border: 2px solid #fff;
            filter: drop-shadow(0 0 5px var(--gta-pink));
        }

        .gta-blip.waypoint { 
            background-color: var(--gta-yellow);
            animation: waypointPulse 1s infinite;
            filter: drop-shadow(0 0 5px var(--gta-yellow));
        }

        .leaflet-routing-container { display: none !important; }
        .leaflet-control-zoom { display: none !important; }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            #ui-container {
                top: 10px;
                left: 10px;
                gap: 10px;
            }

            .hud-panel {
                width: 240px;
                padding: 12px;
            }

            h1 {
                font-size: 18px;
            }

            #speed-panel {
                bottom: 20px;
                right: 20px;
                padding: 12px 18px;
            }

            #speed-value {
                font-size: 42px;
            }
        }

        @media (max-width: 480px) {
            #ui-container {
                top: 5px;
                left: 5px;
                width: calc(100vw - 10px);
            }

            .hud-panel {
                width: 100%;
                max-width: 220px;
            }

            h1 {
                font-size: 16px;
            }

            .btn {
                font-size: 11px;
                padding: 9px;
            }

            #speed-panel {
                bottom: 15px;
                right: 15px;
                padding: 10px 15px;
            }

            #speed-value {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>

    <!-- Visual FX -->
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <div id="ui-container">
        <div class="hud-panel">
            <h1>MAP_SYS_V3</h1>
            
            <select id="map-style" onchange="handleStyleChange()">
                <option value="los-santos">Los Santos Dark</option>
                <option value="vice-city">Vice City Neon</option>
                <option value="liberty-city">Liberty City Classic</option>
                <option value="san-andreas">San Andreas Satellite</option>
            </select>

            <button class="btn" id="btn-locate">📡 Start Tracking</button>
            <button class="btn" id="btn-save-home">💾 Save Safehouse</button>
            <button class="btn" id="btn-go-home">🚗 Route Home</button>
            <button class="btn" id="btn-clear">❌ Clear Route</button>
            
            <div class="status-text" id="status">System Ready</div>
        </div>

        <div class="hud-panel compact" id="route-panel" style="display: none;">
            <h2>🛣️ Navigation</h2>
            <div id="route-info">
                <div class="route-stat">
                    <span class="route-stat-label">Distance:</span>
                    <span class="route-stat-value" id="route-distance">--</span>
                </div>
                <div class="route-stat">
                    <span class="route-stat-label">Est. Time:</span>
                    <span class="route-stat-value" id="route-eta">--</span>
                </div>
                <div class="route-stat">
                    <span class="route-stat-label">Status:</span>
                    <span class="route-stat-value" id="route-status">Calculating...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Speedometer HUD -->
    <div id="speed-panel">
        <div id="speed-value">0</div>
        <div id="speed-unit">MPH</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <script>
        // --- Config & Constants ---
        const CONFIG = {
            DEFAULT_ZOOM: 14,
            TRACKING_ZOOM: 16,
            DEFAULT_LAT: 34.0522,
            DEFAULT_LNG: -118.2437,
            SPEED_UPDATE_INTERVAL: 500,
            STORAGE_KEY: 'gta_safehouse',
            GEOLOCATION_TIMEOUT: 30000
        };

        // --- Audio System (Retro Beeps) ---
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playBeep(freq = 600, duration = 0.1, endFreq = 300) {
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(endFreq, audioCtx.currentTime + duration);
                gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) {
                console.warn('Audio playback failed:', e);
            }
        }

        function playSuccessBeep() {
            playBeep(800, 0.08, 1200);
        }

        function playErrorBeep() {
            playBeep(300, 0.15, 200);
        }

        // Attach beeps to buttons
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', playBeep);
        });

        // --- Map Initialization ---
        const tiles = {
            'los-santos': L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap',
                maxZoom: 19
            }),
            'vice-city': L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap',
                maxZoom: 19
            }),
            'liberty-city': L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap',
                maxZoom: 19
            }),
            'san-andreas': L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Tiles © Esri',
                maxZoom: 18
            })
        };

        const map = L.map('map', { 
            zoomControl: false,
            attributionControl: false
        }).setView([CONFIG.DEFAULT_LAT, CONFIG.DEFAULT_LNG], CONFIG.DEFAULT_ZOOM); 

        let currentLayer = tiles['los-santos'].addTo(map);

        // --- UI & State Management ---
        let playerMarker = null, homeMarker = null, waypointMarker = null, routingControl = null;
        let currentPos = null, watchId = null;
        let isTracking = false;
        let routeData = null;

        const updateStatus = (msg, type = 'normal') => {
            const el = document.getElementById('status');
            el.innerText = `> ${msg}`;
            el.className = `status-text ${type === 'error' ? 'error' : type === 'success' ? 'success' : ''}`;
        };

        const createIcon = (className) => L.divIcon({
            className: `gta-blip ${className}`,
            iconSize: [22, 22],
            iconAnchor: [11, 11],
            html: ''
        });

        const playerIcon = createIcon('player');
        const homeIcon = createIcon('home');
        const waypointIcon = createIcon('waypoint');

        // --- Styling Switcher ---
        function handleStyleChange() {
            const style = document.getElementById('map-style').value;
            map.removeLayer(currentLayer);
            currentLayer = tiles[style].addTo(map);
            const mapEl = document.getElementById('map');
            mapEl.className = style === 'vice-city' ? 'vice-city-filter' : '';
            updateStatus(`STYLE: ${style.toUpperCase()}`, 'success');
            playBeep(800, 0.06);
        }

        // --- Live Tracking & Speedometer ---
        document.getElementById('btn-locate').addEventListener('click', () => {
            if (!navigator.geolocation) {
                updateStatus('ERR: GPS NOT SUPPORTED', 'error');
                playErrorBeep();
                return;
            }
            
            if (isTracking) {
                navigator.geolocation.clearWatch(watchId);
                isTracking = false;
                document.getElementById('speed-panel').style.display = 'none';
                document.getElementById('btn-locate').innerText = '📡 Start Tracking';
                updateStatus('TRACKING DISABLED', 'normal');
                return;
            }

            updateStatus('CONNECTING TO SAT...', 'normal');
            document.getElementById('speed-panel').style.display = 'block';
            isTracking = true;
            document.getElementById('btn-locate').innerText = '⏹️ Stop Tracking';

            if (watchId) navigator.geolocation.clearWatch(watchId);

            const options = {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: CONFIG.GEOLOCATION_TIMEOUT
            };

            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    currentPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    
                    // Update or Create Player Marker
                    if (playerMarker) {
                        playerMarker.setLatLng(currentPos);
                    } else {
                        playerMarker = L.marker(currentPos, {icon: playerIcon}).addTo(map);
                        map.setView(currentPos, CONFIG.TRACKING_ZOOM);
                        playSuccessBeep();
                    }

                    // Update Speed (m/s to MPH)
                    let speedMph = pos.coords.speed ? Math.round(pos.coords.speed * 2.23694) : 0;
                    document.getElementById('speed-value').innerText = speedMph.toString().padStart(3, '0');

                    // Rotate player icon based on heading
                    if (pos.coords.heading !== null && pos.coords.heading !== undefined) {
                        const el = playerMarker.getElement();
                        if(el) el.style.transform = `rotate(${pos.coords.heading + 45}deg) scale(1)`;
                    }

                    updateStatus('TRACKING ACTIVE ✓', 'success');
                },
                (err) => {
                    console.warn('Geolocation error:', err);
                    let errMsg = 'SIGNAL LOST';
                    if (err.code === 1) errMsg = 'PERMISSION DENIED';
                    else if (err.code === 3) errMsg = 'TIMEOUT';
                    updateStatus(`ERR: ${errMsg}`, 'error');
                    playErrorBeep();
                },
                options
            );
        });

        // --- Safehouse Management ---
        function loadSafehouse() {
            const saved = localStorage.getItem(CONFIG.STORAGE_KEY);
            if (saved) {
                try {
                    const coords = JSON.parse(saved);
                    homeMarker = L.marker([coords.lat, coords.lng], {icon: homeIcon}).addTo(map);
                    updateStatus('SAFEHOUSE LOADED', 'success');
                } catch (e) {
                    console.warn('Failed to load safehouse:', e);
                }
            }
        }

        loadSafehouse();

        document.getElementById('btn-save-home').addEventListener('click', () => {
            if (!currentPos) {
                updateStatus('ERR: NO GPS FIX', 'error');
                playErrorBeep();
                return;
            }
            localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(currentPos));
            if (homeMarker) map.removeLayer(homeMarker);
            homeMarker = L.marker(currentPos, {icon: homeIcon}).addTo(map);
            updateStatus('SAFEHOUSE SAVED ✓', 'success');
            playSuccessBeep();
        });

        // --- Waypoints & Routing ---
        map.on('click', (e) => {
            playBeep();
            if (waypointMarker) map.removeLayer(waypointMarker);
            waypointMarker = L.marker(e.latlng, {icon: waypointIcon}).addTo(map);
            
            if (currentPos) {
                routeTo(e.latlng);
                updateStatus('ROUTE CALCULATED', 'success');
            } else {
                updateStatus('WAYPOINT SET. ENABLE GPS.', 'normal');
            }
        });

        document.getElementById('btn-go-home').addEventListener('click', () => {
            if (!currentPos || !homeMarker) {
                updateStatus('ERR: NEED GPS & SAFEHOUSE', 'error');
                playErrorBeep();
                return;
            }
            routeTo(homeMarker.getLatLng());
            updateStatus('ROUTING TO SAFEHOUSE...', 'normal');
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            if (routingControl) {
                map.removeControl(routingControl);
                routingControl = null;
                routeData = null;
            }
            if (waypointMarker) {
                map.removeLayer(waypointMarker);
                waypointMarker = null;
            }
            document.getElementById('route-panel').style.display = 'none';
            updateStatus('ROUTE CLEARED', 'normal');
            playBeep(300, 0.1);
        });

        function formatDistance(meters) {
            if (meters < 1000) return Math.round(meters) + ' m';
            return (meters / 1000).toFixed(1) + ' km';
        }

        function formatDuration(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            if (mins > 60) {
                const hours = Math.floor(mins / 60);
                return hours + 'h ' + (mins % 60) + 'm';
            }
            return mins + 'm ' + secs + 's';
        }

        function routeTo(destination) {
            if (routingControl) map.removeControl(routingControl);
            
            routingControl = L.Routing.control({
                waypoints: [ currentPos, destination ],
                router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' }),
                lineOptions: {
                    styles: [
                        {color: 'var(--gta-purple)', opacity: 0.8, weight: 7},
                        {color: '#9b59b6', opacity: 0.3, weight: 10}
                    ]
                },
                createMarker: () => null,
                fitSelectedRoutes: true,
                show: false,
                addWaypoints: false,
                draggableWaypoints: false,
                routeWhileDragging: false
            });

            routingControl.on('routesfound', (e) => {
                const route = e.routes[0];
                if (route) {
                    routeData = {
                        distance: route.summary.totalDistance,
                        duration: route.summary.totalTime
                    };

                    document.getElementById('route-distance').innerText = formatDistance(route.summary.totalDistance);
                    document.getElementById('route-eta').innerText = formatDuration(route.summary.totalTime);
                    document.getElementById('route-status').innerText = 'ACTIVE';
                    document.getElementById('route-panel').style.display = 'block';
                }
            });

            routingControl.on('routingerror', () => {
                updateStatus('ROUTING ERROR', 'error');
                playErrorBeep();
            });

            routingControl.addTo(map);
        }

        // Handle permission requests gracefully
        document.addEventListener('DOMContentLoaded', () => {
            updateStatus('System Ready', 'success');
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (watchId) navigator.geolocation.clearWatch(watchId);
        });
    </script>
</body>
</html>

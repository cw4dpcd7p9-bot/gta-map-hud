<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA-Style Map HUD V3</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <style>
        :root {
            --gta-gold: #f2c94c;
            --gta-green: #2ecc71;
            --gta-pink: #ff00ff;
            --gta-yellow: #f1c40f;
            --hud-bg: rgba(10, 10, 10, 0.9);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: #000;
            font-family: 'Impact', 'Arial Black', sans-serif;
            overflow: hidden;
            user-select: none;
        }
        
        #map { height: 100vh; width: 100vw; transition: filter 0.8s ease; }

        /* Visual FX */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 900;
        }
        .vignette {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            box-shadow: 0 0 150px rgba(0,0,0,0.8) inset; pointer-events: none; z-index: 901;
        }
        
        .vice-city-filter { filter: hue-rotate(280deg) saturate(250%) contrast(130%) invert(10%); }

        /* HUD Styling */
        #ui-container {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            display: flex; flex-direction: column; gap: 15px; pointer-events: none; 
        }

        .hud-panel {
            background: var(--hud-bg);
            border: 2px solid var(--gta-gold);
            border-radius: 4px; padding: 15px; width: 280px;
            box-shadow: 0 0 15px rgba(242, 201, 76, 0.2);
            pointer-events: auto; backdrop-filter: blur(8px);
        }

        #speed-panel {
            position: absolute; bottom: 30px; right: 30px; z-index: 1000;
            background: var(--hud-bg); border: 2px solid var(--gta-gold);
            padding: 10px 20px; border-radius: 4px;
            text-align: right; box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        #speed-value { font-size: 48px; color: #fff; line-height: 1; text-shadow: 2px 2px 0px var(--gta-gold); }
        #speed-unit { font-size: 16px; color: var(--gta-gold); letter-spacing: 2px; }

        h1 { margin: 0 0 15px 0; font-size: 26px; text-transform: uppercase; letter-spacing: 2px; color: var(--gta-gold); text-shadow: 2px 2px 0px #000; }

        .btn {
            background: linear-gradient(to bottom, #333, #111);
            color: #fff; border: 1px solid var(--gta-gold);
            padding: 12px; margin-bottom: 10px; width: 100%;
            cursor: pointer; font-family: inherit; font-size: 14px;
            text-transform: uppercase; transition: 0.1s;
        }
        .btn:active { transform: scale(0.98); background: var(--gta-gold); color: #000; }

        select { width: 100%; padding: 10px; margin-bottom: 15px; background: #000; color: var(--gta-gold); border: 1px solid var(--gta-gold); font-family: inherit; outline: none; }

        .status-text { font-size: 11px; color: #0f0; margin-top: 5px; font-family: 'Courier New', Courier, monospace; text-transform: uppercase; }

        /* GTA V Style Player Marker */
        .gta-blip.player {
            background-color: var(--gta-green);
            border: 2px solid #fff;
            border-radius: 50% 50% 50% 0;
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.8);
            transform-origin: center center;
            transition: transform 0.2s linear; 
        }
        .gta-blip.home { background-color: var(--gta-pink); border: 2px solid #fff; }
        .gta-blip.waypoint { background-color: var(--gta-yellow); border: 2px solid #000; }

        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div class="vignette"></div>

    <div id="ui-container">
        <div class="hud-panel">
            <h1>MAP_SYS_V3</h1>
            <select id="map-style">
                <option value="los-santos">Los Santos Dark</option>
                <option value="vice-city">Vice City Neon</option>
                <option value="liberty-city">Liberty City Classic</option>
                <option value="san-andreas">San Andreas Satellite</option>
            </select>
            <button class="btn" id="btn-locate">📡 Start Live Tracking</button>
            <button class="btn" id="btn-save-home">💾 Save Safehouse</button>
            <button class="btn" id="btn-go-home">🚗 Route to Safehouse</button>
            <button class="btn" id="btn-clear">❌ Clear Data</button>
            <div class="status-text" id="status">Awaiting input...</div>
        </div>
    </div>

    <div id="speed-panel" style="display: none;">
        <div id="speed-value">0</div>
        <div id="speed-unit">MPH</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <script>
        const tiles = {
            'los-santos': L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'),
            'vice-city': L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'),
            'liberty-city': L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png'),
            'san-andreas': L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
        };

        const map = L.map('map', { zoomControl: false }).setView([34.0522, -118.2437], 14); 
        let currentLayer = tiles['los-santos'].addTo(map);

        let playerMarker = null, homeMarker = null, waypointMarker = null, routingControl = null;
        let currentPos = null, watchId = null;

        const updateStatus = (msg) => document.getElementById('status').innerText = `> ${msg}`;

        document.getElementById('map-style').addEventListener('change', (e) => {
            map.removeLayer(currentLayer);
            currentLayer = tiles[e.target.value].addTo(map);
            document.getElementById('map').className = e.target.value === 'vice-city' ? 'vice-city-filter' : '';
        });

        document.getElementById('btn-locate').addEventListener('click', () => {
            document.getElementById('speed-panel').style.display = 'block';
            if (watchId) navigator.geolocation.clearWatch(watchId);
            watchId = navigator.geolocation.watchPosition((pos) => {
                currentPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                
                if (!playerMarker) {
                    playerMarker = L.marker(currentPos, {
                        icon: L.divIcon({ className: 'gta-blip player', iconSize: [20, 20], iconAnchor: [10, 10] })
                    }).addTo(map);
                }
                playerMarker.setLatLng(currentPos);

                if (pos.coords.heading !== null) {
                    playerMarker.getElement().style.transform = `rotate(${pos.coords.heading - 45}deg)`;
                }

                document.getElementById('speed-value').innerText = pos.coords.speed ? Math.round(pos.coords.speed * 2.23694) : 0;
            }, null, { enableHighAccuracy: true });
        });

        document.getElementById('btn-save-home').addEventListener('click', () => {
            if (!currentPos) return;
            localStorage.setItem('gta_safehouse', JSON.stringify(currentPos));
            if (homeMarker) map.removeLayer(homeMarker);
            homeMarker = L.marker(currentPos, {icon: L.divIcon({className: 'gta-blip home', iconSize: [20, 20], iconAnchor: [10, 10]})}).addTo(map);
            updateStatus('SAFEHOUSE SAVED');
        });

        map.on('click', (e) => {
            if (waypointMarker) map.removeLayer(waypointMarker);
            waypointMarker = L.marker(e.latlng, {icon: L.divIcon({className: 'gta-blip waypoint', iconSize: [20, 20], iconAnchor: [10, 10]})}).addTo(map);
            if (currentPos) routeTo(e.latlng);
        });

        function routeTo(destination) {
            if (routingControl) map.removeControl(routingControl);
            routingControl = L.Routing.control({
                waypoints: [ currentPos, destination ],
                router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' }),
                lineOptions: { styles: [{color: '#9b59b6', opacity: 0.8, weight: 7}] },
                createMarker: () => null,
                fitSelectedRoutes: false, show: false 
            }).addTo(map);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA-Style Map HUD</title>
    
    <!-- Leaflet & Routing Machine CSS (Free Open Source APIs) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #000;
            font-family: 'Impact', 'Arial Black', sans-serif;
            overflow: hidden;
        }
        
        #map {
            height: 100vh;
            width: 100vw;
            transition: filter 0.5s ease;
        }
        
        /* Vice City Neon Filter Logic */
        .vice-city-filter {
            filter: hue-rotate(280deg) saturate(200%) contrast(120%) invert(10%);
        }

        /* Luxury Urban UI Overlay */
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none; 
        }

        .hud-panel {
            background: rgba(15, 15, 15, 0.85);
            border: 2px solid #D4AF37; /* Premium Gold Accent */
            border-radius: 8px;
            padding: 15px;
            color: #fff;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            pointer-events: auto;
            width: 280px;
            backdrop-filter: blur(5px);
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #D4AF37;
            text-shadow: 2px 2px 0px #000;
        }

        .btn {
            background: linear-gradient(135deg, #222, #0a0a0a);
            color: #fff;
            border: 1px solid #D4AF37;
            padding: 10px;
            margin-bottom: 8px;
            width: 100%;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            text-transform: uppercase;
            transition: all 0.2s;
            border-radius: 4px;
        }
        
        .btn:hover {
            background: #D4AF37;
            color: #000;
            box-shadow: 0 0 10px #D4AF37;
        }

        select {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            background: #111;
            color: #D4AF37;
            border: 1px solid #D4AF37;
            font-family: inherit;
            border-radius: 4px;
            outline: none;
        }

        .status-text {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
            font-family: monospace;
            text-transform: uppercase;
        }

        /* Custom In-Game Blips */
        .gta-blip {
            background-color: #fff;
            border: 3px solid #000;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(0,0,0,0.9);
        }
        .gta-blip.player {
            background-color: #00ff00; /* Classic Player Green */
            border-radius: 50% 50% 0 50%; /* Arrow Shape */
            transform: rotate(45deg);
        }
        .gta-blip.home {
            background-color: #ff00ff; /* Safehouse Pink/Purple */
            border-radius: 0;
            border: 2px solid #fff;
        }
        .gta-blip.waypoint {
            background-color: #ffff00; /* Waypoint Yellow */
        }
        
        /* Hide bulky default routing text to keep the HUD clean */
        .leaflet-routing-container {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="hud-panel">
            <h1>MAP SYSTEM</h1>
            
            <label for="map-style" style="font-size: 12px; color: #888;">ICONIC INSPIRATION</label>
            <select id="map-style">
                <option value="los-santos">Los Santos Dark</option>
                <option value="vice-city">Vice City Neon</option>
                <option value="liberty-city">Liberty City Classic</option>
                <option value="san-andreas">San Andreas Satellite</option>
            </select>

            <button class="btn" id="btn-locate">📍 Locate Me</button>
            <button class="btn" id="btn-save-home">🏠 Save Safehouse</button>
            <button class="btn" id="btn-go-home">🚗 Route to Safehouse</button>
            <button class="btn" id="btn-clear">❌ Clear Waypoint</button>
            
            <div class="status-text" id="status">System initialized. Click map to set custom waypoint.</div>
        </div>
    </div>

    <div id="map"></div>

    <!-- Leaflet & Routing Machine JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <script>
        // 1. Stylized Maps: Base Tile Layers (Free & No API Key Required)
        const tiles = {
            'los-santos': L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap, &copy; CartoDB'
            }),
            'vice-city': L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap, &copy; CartoDB'
            }),
            'liberty-city': L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }),
            'san-andreas': L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Tiles &copy; Esri'
            })
        };

        // Initialize Map (Defaulting to a standard starting view)
        const map = L.map('map', {
            zoomControl: false // Hide default zoom for cleaner HUD
        }).setView([34.0522, -118.2437], 13); 
        
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        let currentLayer = tiles['los-santos'];
        currentLayer.addTo(map);

        // State Trackers
        let playerMarker = null;
        let homeMarker = null;
        let waypointMarker = null;
        let routingControl = null;
        let currentPos = null;

        // Custom Blip Generator
        const createIcon = (className) => L.divIcon({
            className: `gta-blip ${className}`,
            iconSize: [20, 20],
            iconAnchor: [10, 10]
        });

        const playerIcon = createIcon('player');
        const homeIcon = createIcon('home');
        const waypointIcon = createIcon('waypoint');

        const updateStatus = (msg) => {
            document.getElementById('status').innerText = msg;
        };

        // 2. Iconic Inspirations: Map Style Switching
        document.getElementById('map-style').addEventListener('change', (e) => {
            const style = e.target.value;
            map.removeLayer(currentLayer);
            currentLayer = tiles[style];
            currentLayer.addTo(map);

            // Apply experimental CSS filter for Vice City synthwave look
            const mapContainer = document.getElementById('map');
            if (style === 'vice-city') {
                mapContainer.classList.add('vice-city-filter');
            } else {
                mapContainer.classList.remove('vice-city-filter');
            }
            updateStatus(`Visuals updated: ${e.target.options[e.target.selectedIndex].text}`);
        });

        // 3. Location Services: Geolocation API
        document.getElementById('btn-locate').addEventListener('click', () => {
            updateStatus('Pinging GPS satellites...');
            map.locate({setView: true, maxZoom: 16});
        });

        map.on('locationfound', (e) => {
            currentPos = e.latlng;
            if (playerMarker) {
                playerMarker.setLatLng(currentPos);
            } else {
                playerMarker = L.marker(currentPos, {icon: playerIcon}).addTo(map);
            }
            updateStatus('Player location acquired.');
        });

        map.on('locationerror', (e) => {
            updateStatus('GPS signal lost. Enable browser location permissions.');
        });

        // 4. Personalized Experience: Load/Save Home (LocalStorage)
        const savedHome = localStorage.getItem('gta_safehouse');
        if (savedHome) {
            const coords = JSON.parse(savedHome);
            homeMarker = L.marker([coords.lat, coords.lng], {icon: homeIcon}).addTo(map);
        }

        document.getElementById('btn-save-home').addEventListener('click', () => {
            if (!currentPos) {
                updateStatus('Error: Find your location first.');
                return;
            }
            // Saves locally to the browser indefinitely
            localStorage.setItem('gta_safehouse', JSON.stringify({lat: currentPos.lat, lng: currentPos.lng}));
            
            if (homeMarker) map.removeLayer(homeMarker);
            homeMarker = L.marker(currentPos, {icon: homeIcon}).addTo(map);
            updateStatus('Safehouse coordinates locked in.');
        });

        // 5. Navigation Made Fun: Route to Clicked Waypoint
        map.on('click', (e) => {
            if (waypointMarker) map.removeLayer(waypointMarker);
            waypointMarker = L.marker(e.latlng, {icon: waypointIcon}).addTo(map);
            
            if (currentPos) {
                routeTo(e.latlng);
            } else {
                updateStatus('Waypoint dropped. Locate yourself to calculate route.');
            }
        });

        // Route to Safehouse
        document.getElementById('btn-go-home').addEventListener('click', () => {
            if (!currentPos) {
                updateStatus('Find location first.');
                return;
            }
            if (!homeMarker) {
                updateStatus('No safehouse on record.');
                return;
            }
            routeTo(homeMarker.getLatLng());
            updateStatus('GPS routing to Safehouse...');
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            if (routingControl) {
                map.removeControl(routingControl);
                routingControl = null;
            }
            if (waypointMarker) {
                map.removeLayer(waypointMarker);
                waypointMarker = null;
            }
            updateStatus('Waypoint cleared.');
        });

        // Core Routing Logic using free OSRM backend
        function routeTo(destination) {
            if (routingControl) map.removeControl(routingControl);
            
            routingControl = L.Routing.control({
                waypoints: [
                    currentPos,
                    destination
                ],
                router: L.Routing.osrmv1({
                    serviceUrl: 'https://router.project-osrm.org/route/v1'
                }),
                lineOptions: {
                    styles: [{color: '#D4AF37', opacity: 0.9, weight: 6}] // Gold GPS path
                },
                createMarker: function() { return null; }, 
                fitSelectedRoutes: true,
                show: false 
            }).addTo(map);
        }
    </script>
</body>
</html>
